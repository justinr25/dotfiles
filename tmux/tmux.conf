# ==============================================================================
# GENERAL OPTIONS
# ==============================================================================

# Enable mouse support
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Start window and pane numbering at 1 (more ergonomic)
set -g base-index 1
setw -g pane-base-index 1

# Rename windows to reflect current program automatically
setw -g automatic-rename on
set -g renumber-windows on

# Address vim switching delay (extremely important for vim/neovim users!)
set -s escape-time 0

# Upgrade terminal color support
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style


# ==============================================================================
# PLUGINS
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Plugin configuration
set -g @catppuccin_flavour 'mocha'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# ==============================================================================
# INITIALIZE TPM (Plugin Manager)
# ==============================================================================
run '~/.tmux/plugins/tpm/tpm'

# ==============================================================================
# KEYBINDINGS (Placed after TPM to override plugin defaults)
# ==============================================================================

# Use space for prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

# Reload tmux config with Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!" # same as prefix + R at the moment?

# Split panes visually and preserve current path
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# New windows open in the current path
bind c new-window -c "#{pane_current_path}"

# Kill pane/window without confirmation
bind-key x kill-pane
bind-key & kill-window

# Custom border styles (placed after TPM to override theme settings)
#set -g pane-active-border-style 'fg=magenta,bg=default'
#set -g pane-border-style 'fg=brightblack,bg=default'
setw -g mode-keys vi             # vim keybinds Copy Mode (scrollback buffer) (prefix + [)
