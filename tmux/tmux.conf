# ==============================================================================
# GENERAL OPTIONS
# ==============================================================================

# Enable mouse support
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Start window and pane numbering at 1 (more ergonomic)
set -g base-index 1
setw -g pane-base-index 1

# Rename windows to reflect current program automatically
#setw -g automatic-rename on
set -g renumber-windows on

# Address vim switching delay (extremely important for vim/neovim users!)
set -s escape-time 0

# Upgrade terminal color support
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style


# ==============================================================================
# PLUGINS
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm' # must be first plugin
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank' # copies to system clipboard
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist temux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically save sessions every 15 min
set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
#set -g @plugin 'alexwforsythe/tmux-which-key'


# Plugin configuration
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @sessionx-bind 'o'
set -g @sessionx-bind-kill-session 'ctrl-bspace'

# Configure Online status
set -g @online_icon "ok"
set -g @offline_icon "nok"


# ==============================================================================
# LOAD CATPPUCCIN THEME MANUALLY (To define colors before custom style overrides)
# ==============================================================================
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'


# ==============================================================================
# CUSTOM THEME / STYLE OVERRIDES
# ==============================================================================

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "

# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"
# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

# status right look and feel
set -g status-right-length 250
set -g status-right ""
# set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_green}]}} #{battery_icon} #{battery_percentage} "
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_rosewater}] 󰖩 on ,#[fg=#{@thm_red}]#[bold]#[reverse] 󰖪 off }"
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "


# Configure Tmux
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
# setw -g pane-border-status top
# setw -g pane-border-format ""
# setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
# setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
# setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_overlay_1}"

set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"


# ==============================================================================
# KEYBINDINGS
# ==============================================================================

# Use space for prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Resize panes
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

# Swap panes
bind-key -r C-h run-shell 'c=$(tmux display-message -p "##P"); tmux select-pane -L; if [ "$c" != "$(tmux display-message -p "##P")" ]; then tmux swap-pane -t !; fi'
bind-key -r C-j run-shell 'c=$(tmux display-message -p "##P"); tmux select-pane -D; if [ "$c" != "$(tmux display-message -p "##P")" ]; then tmux swap-pane -t !; fi'
bind-key -r C-k run-shell 'c=$(tmux display-message -p "##P"); tmux select-pane -U; if [ "$c" != "$(tmux display-message -p "##P")" ]; then tmux swap-pane -t !; fi'
bind-key -r C-l run-shell 'c=$(tmux display-message -p "##P"); tmux select-pane -R; if [ "$c" != "$(tmux display-message -p "##P")" ]; then tmux swap-pane -t !; fi'

# Reload tmux config with Prefix + r
#bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!" # same as prefix + R at the moment?

# Split panes visually and preserve current path
unbind %
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
bind h split-window -v -c "#{pane_current_path}"

# New windows open in the current path
bind c new-window -c "#{pane_current_path}"

# Kill pane/window without confirmation
bind-key x kill-pane
bind-key & kill-window

# Toggle pane zoom
unbind z
bind Enter resize-pane -Z

# Drag copy using mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Custom border styles (placed after TPM to override theme settings)
#set -g pane-active-border-style 'fg=magenta,bg=default'
#set -g pane-border-style 'fg=brightblack,bg=default'

# vim keybinds Copy Mode (scrollback buffer) (prefix + [)
setw -g mode-keys vi

# Copy Mode keybinds
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi '_' send-keys -X back-to-indentation
#bind-key -T copy-mode-vi 'y' send -X copy-selection (already have tmux-yank)


# ==============================================================================
# INITIALIZE TPM (Plugin Manager) - Keep this at the very bottom
# ==============================================================================
run '~/.tmux/plugins/tpm/tpm'
