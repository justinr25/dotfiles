# Enable mouse support
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Start window and pane numbering at 1 (more ergonomic)
set -g base-index 1
setw -g pane-base-index 1

# Rename windows to reflect current program automatically
setw -g automatic-rename on
set -g renumber-windows on

# Address vim switching delay (extremely important for vim/neovim users!)
set -s escape-time 0

# Upgrade terminal color support
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"


set -g @catppuccin_flavour 'mocha'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# Reload tmux config with Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes visually and preserve current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows open in the current path
bind c new-window -c "#{pane_current_path}"

run '~/.tmux/plugins/tpm/tpm'
